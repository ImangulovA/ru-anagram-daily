# Cloudflare Worker config for the daily Anagram global-stats backend.
# Deploy:
#   wrangler d1 create anagram-stats      # paste database_id below
#   wrangler d1 execute anagram-stats --remote --file=schema.sql
#   wrangler deploy

name = "anagram-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# CORS allowlist (comma-separated). Origin is scheme+host only (no path), so one
# entry covers every GitHub Pages project under the user. Plus localhost ports.
[vars]
ALLOWED_ORIGINS = "https://imangulova.github.io,http://localhost:8765,http://localhost:5173,http://localhost:4173"

# Created with: wrangler d1 create anagram-stats
[[d1_databases]]
binding = "DB"
database_name = "anagram-stats"
database_id = "316f5105-929e-44ec-b890-508a1bc66577"
