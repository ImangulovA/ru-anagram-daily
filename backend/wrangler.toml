# =====================================================================
# DO NOT DEPLOY FROM HERE. The RU game reuses the ENGLISH anagram-stats
# worker + D1 (see app/src/lib/config.js STATS_API). This file is a copy
# of anagram-daily/backend and points at that same worker + database_id
# below, so `wrangler deploy` here would REDEPLOY the English worker.
# RU rows stay separate via the stats game key 'ru-anagram-daily'.
# Only touch this file if you decide to split RU onto its own worker
# (then rename `name` and create a fresh D1 database).
# =====================================================================

name = "anagram-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# CORS allowlist (comma-separated). Origin is scheme+host only (no path), so one
# entry covers every GitHub Pages project under the user. Plus localhost ports.
[vars]
ALLOWED_ORIGINS = "https://imangulova.github.io,http://localhost:8765,http://localhost:5173,http://localhost:4173"

# Created with: wrangler d1 create anagram-stats
[[d1_databases]]
binding = "DB"
database_name = "anagram-stats"
database_id = "316f5105-929e-44ec-b890-508a1bc66577"
