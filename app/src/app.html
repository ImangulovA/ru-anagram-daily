<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Landing page (root route, no ?day) hides the header logo before first
         paint so the animated wordmark only appears once, centered on the page. -->
    <script>
      (function () {
        try {
          var p = location.pathname.replace(/\/+$/, '');
          var isSub = /\/(archive|stats)$/.test(p);
          var hasDay = new URLSearchParams(location.search).has('day');
          if (!isSub && !hasDay) document.documentElement.classList.add('is-home');
        } catch (e) {}
      })();
    </script>
    <!-- Fonts: swap for your own per fork. Self-hosted is better, this is a stub. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
